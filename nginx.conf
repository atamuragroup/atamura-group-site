server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip для текстовых ассетов
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/xml application/javascript
                      application/json image/svg+xml application/xml
                      application/rss+xml font/ttf font/otf application/vnd.ms-fontobject;

    # --- заголовки безопасности (соответствуют файлу _headers) ---
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-Frame-Options          "SAMEORIGIN"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # кастомная страница 404
    error_page 404 /404.html;

    # кэширование статики
    location /assets/ {
        add_header X-Content-Type-Options   "nosniff"                        always;
        add_header X-Frame-Options          "SAMEORIGIN"                     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control            "public, max-age=86400"          always;
        try_files $uri =404;
    }

    # поддержка «чистых» URL: /o-kompanii → /o-kompanii.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
