server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Контейнер стоит за хостовым nginx (TLS-терминация) → к нам приходит адрес
    # docker-моста. Доверяем ему и берём реальный IP из X-Forwarded-For, иначе
    # $proxy_add_x_forwarded_for допишет 172.x и rate-limit в leads-api
    # (берёт крайний правый элемент) схлопнется в один общий бакет.
    set_real_ip_from  172.16.0.0/12;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # gzip для текстовых ассетов
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/xml application/javascript
                      application/json image/svg+xml application/xml
                      application/rss+xml font/ttf font/otf application/vnd.ms-fontobject;

    # --- заголовки безопасности (соответствуют файлу _headers) ---
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-Frame-Options          "SAMEORIGIN"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # кастомная страница 404
    error_page 404 /404.html;

    # кэширование статики
    location /assets/ {
        add_header X-Content-Type-Options   "nosniff"                        always;
        add_header X-Frame-Options          "SAMEORIGIN"                     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control            "public, max-age=86400"          always;
        try_files $uri =404;
    }

    # заявки форм → Node-бэкенд leads-api по внутренней сети compose
    location /api/ {
        client_max_body_size 256k;          # совпадает с bodyLimit сервера
        proxy_pass http://leads-api:3000;   # Docker DNS = имя сервиса
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;  # сервер берёт крайний правый
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # поддержка «чистых» URL: /o-kompanii → /o-kompanii.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
