name: Daily price update from ProfitBase

# Цель — ~20:00 Алматы (UTC+5). GitHub cron — best-effort: запуски на «ровном» :00 UTC
# сильно задерживаются/иногда пропускаются. Поэтому минута :50 (меньше очередь) + резервный
# вечерний прогон: если основной GitHub задержал/пропустил — резерв догонит. Коммит делается
# только при реальном изменении цен, поэтому повторный прогон без изменений = no-op.
on:
  schedule:
    - cron: "50 14 * * *"   # ~19:50 Алматы — основной
    - cron: "50 16 * * *"   # ~21:50 Алматы — резерв (no-op, если цены уже обновлены)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: price-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow & reportlab
        run: pip install --quiet Pillow reportlab

      - name: Fetch prices & plannings from ProfitBase
        env:
          PROFITBASE_API_KEY: ${{ secrets.PROFITBASE_API_KEY }}
        run: python3 scripts/fetch_plannings.py

      # PDF-каталог берёт цены из zhk-data.js — пересобираем сразу после обновления цен,
      # чтобы каталог не разъезжался с сайтом. Сбой генерации НЕ блокирует обновление цен.
      - name: Rebuild catalog PDF (non-blocking)
        run: python3 scripts/gen_catalog_pdf.py || echo "::warning::PDF generation failed — цены обновятся, каталог останется прежним"

      - name: Cache-bust changed assets
        run: python3 scripts/cache_bust.py

      - name: Commit & push if changed
        run: |
          git config user.name "atamura-price-bot"
          git config user.email "price-bot@atamuragroup.kz"
          git add -A
          if git diff --cached --quiet; then
            echo "Изменений нет — цены актуальны."
          else
            git commit -m "chore(prices): авто-обновление цен/планировок из ProfitBase ($(date -u +%Y-%m-%d))"
            git push
            echo "Цены обновлены и запушены."
          fi
